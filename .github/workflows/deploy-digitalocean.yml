name: Deploy to DigitalOcean

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
          DEPLOY_USER: ${{ secrets.DIGITALOCEAN_USER }}
          DEPLOY_PATH: ${{ secrets.DIGITALOCEAN_APP_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${DEPLOY_PATH}"
          rsync -az --delete --exclude '.git' ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH} && cp -n .env.example .env || true && docker compose pull && docker compose up -d --build"
